name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      release_targets:
        description: Run mobile release builds after tests (default on push/PR is tests only).
        required: false
        default: none
        type: choice
        options:
          - none
          - android
          - ios
          - both

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.6'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Run tests
      run: flutter test --coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        file: coverage/lcov.info

  build-android:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.release_targets == 'android' || github.event.inputs.release_targets == 'both')

    steps:
    - uses: actions/checkout@v6

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.6'
        channel: 'stable'

    - name: Decode Secrets
      env:
        ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
        printf '%s\n' "$ANDROID_KEY_PROPERTIES" > android/key.properties

    - name: Install dependencies
      run: flutter pub get

    - name: Build App Bundle
      run: flutter build appbundle --release

    # Version name + build number come from pubspec.yaml (e.g. 1.0.0+42 → speleo_trace-1.0.0-42.aab)
    - name: Name AAB with version and build number
      id: aab
      run: |
        VERSION_LINE=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')
        VERSION_NAME="${VERSION_LINE%%+*}"
        BUILD_NUMBER="${VERSION_LINE#*+}"
        if [ "$VERSION_NAME" = "$VERSION_LINE" ]; then
          BUILD_NUMBER="0"
        fi
        SAFE_NAME="speleo_trace-${VERSION_NAME}-${BUILD_NUMBER}.aab"
        mkdir -p build/artifacts
        cp build/app/outputs/bundle/release/app-release.aab "build/artifacts/${SAFE_NAME}"
        echo "file=${SAFE_NAME}" >> "$GITHUB_OUTPUT"
        echo "artifact=speleo_trace-${VERSION_NAME}-${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.aab.outputs.artifact }}
        path: build/artifacts/${{ steps.aab.outputs.file }}

#    - name: Build APK
#      run: flutter build apk --release

#    - name: Upload APK
#      uses: actions/upload-artifact@v6
#      with:
#        name: app-release.apk
#        path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.release_targets == 'ios' || github.event.inputs.release_targets == 'both')

    steps:
    - uses: actions/checkout@v6

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.6'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Build iOS
      run: flutter build ios --release --no-codesign

  release:
    runs-on: ubuntu-latest
    needs: [test, build-android, build-ios]
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.test.result == 'success' &&
      (needs.build-android.result == 'success' || needs.build-android.result == 'skipped') &&
      (needs.build-ios.result == 'success' || needs.build-ios.result == 'skipped')
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.6'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Run semantic-release
      uses: cycjimmy/semantic-release-action@v6
      with:
        semantic_version: 25.0.0
        extra_plugins: |
          @semantic-release/commit-analyzer
          @semantic-release/release-notes-generator
          @semantic-release/changelog
          @semantic-release/git
          @semantic-release/github
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
